<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OOP Dart - Uliya Gumpari</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* GALAXY */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER */
header{
text-align:center;
padding:40px 15px;
}

header h1{
font-size:clamp(22px,4vw,36px);
color:#38bdf8;
}

header p{
margin-top:8px;
color:#cbd5f5;
font-size:14px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:25px;
max-width:1200px;
margin:auto;
}

/* CARD */
.card{

background:rgba(0,0,0,0.6);
border:1px solid #22d3ee;
border-radius:15px;
padding:22px;

transition:0.4s;
box-shadow:0 0 10px #0ea5e9;

}

.card:hover{

transform:translateY(-8px) scale(1.03);

box-shadow:0 0 25px #22d3ee;

}

.card h2{
color:#22d3ee;
margin-bottom:10px;
font-size:18px;
}

.card p{
font-size:14px;
line-height:1.6;
margin-bottom:18px;
}

/* BUTTON */
button{

background:#0284c7;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:14px;

}

button:hover{
background:#0ea5e9;
}

/* POPUP */

.popup{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);

justify-content:center;
align-items:center;

padding:15px;

}

.popup-content{

width:100%;
max-width:900px;

background:#020617;

padding:15px;

border-radius:15px;

}

iframe{

width:100%;
height:65vh;
border:none;
border-radius:10px;

}

.close{

float:right;
font-size:22px;
cursor:pointer;

}

/* FOOTER */

footer{

text-align:center;
padding:25px;
font-size:13px;
color:#94a3b8;

}

/* MOBILE */

@media(max-width:600px){

.card{
padding:18px;
}

iframe{
height:55vh;
}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<header>

<h1>Object Oriented Programming - Dart</h1>

<p>Nama: Uliya Gumpari | NIM: 251410008 | Kelas: SI2A</p>

</header>

<!-- isi card tetap sama seperti punyamu -->

<div class="popup" id="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">✖</span>

<iframe id="dartframe"></iframe>

</div>

</div>

<footer>

Website Tugas OOP Dart - 2026

</footer>

<script>

const links=[

"https://dartpad.dev/?id=2ffef3d81726bfde3daa75f5ab548ef9",
"https://dartpad.dev/?id=25efca52d8ff16170c292b4460287493",
"https://dartpad.dev/?id=a9b94f9d14c5a117775a665534ccca55",
"https://dartpad.dev/?id=6ccaec7c380565edfe9ef90eebfa4754",
"https://dartpad.dev/?id=8deb8c7967c461c4bf87dae44d88c0ea",
"https://dartpad.dev/?id=69ca2d83e1cb329672c55d5652a3db64",
"https://dartpad.dev/?id=a95bf60df5366b4804bff7e7cab10c9f",
"https://dartpad.dev/?id=76eba14427fb1c7a95b2bc2b0cb0a4e4"

];

function openPopup(i){

document.getElementById("popup").style.display="flex";

document.getElementById("dartframe").src=links[i];

}

function closePopup(){

document.getElementById("popup").style.display="none";

}

/* GALAXY */

const canvas=document.getElementById("stars");

const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();

window.addEventListener("resize",resize);

let stars=[];

for(let i=0;i<250;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.size,0,Math.PI*2);

ctx.fill();

s.y+=0.2;

if(s.y>canvas.height){

s.y=0;

}

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
